<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="pageTitle">图片审核系统</title>
    <link id="pageIcon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128247;</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
    // Theme toggle — runs before render to prevent FOUC
    (function() {
        var theme = localStorage.getItem('review_theme');
        if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', theme);
    })();
    function toggleTheme() {
        var html = document.documentElement;
        var current = html.getAttribute('data-theme');
        var next = current === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('review_theme', next);
    }
    </script>
</head>
<body>
    <!-- Top progress bar -->
    <div id="topProgressBar" class="top-progress-bar">
        <div id="topProgressFill" class="top-progress-fill"></div>
    </div>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <span class="user-info">
                <span id="userNickname" class="nickname" onclick="editNickname()">加载中...</span>
                <span class="review-count">已审核 <span id="userReviewCount">0</span> 张</span>
            </span>
        </div>

        <div class="nav-center">
            <div class="progress-container">
                <span class="progress-label"><span id="progressPercent">0</span>%</span>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <span class="progress-detail"><span id="reviewedCount">0</span>/<span id="totalCount">0</span></span>
            </div>

            <div class="complete-container">
                <span class="complete-label">完成</span>
                <span id="completeCount" class="complete-count">0</span>
                <span class="complete-total">/<span id="totalImages">0</span></span>
            </div>
        </div>

        <div class="nav-right">
            <button id="themeToggle" class="btn btn-theme" onclick="toggleTheme()" title="切换主题">
                <span id="themeIcon"></span>
            </button>
            <button id="ruleBtn" class="btn btn-rule" onclick="showRuleModal()">审核要求</button>
            <button id="noticeBtn" class="btn btn-rule btn-notice" onclick="showNoticeModal()" title="公告" style="display:none;">公告</button>
            <button id="roleSelectBtnMobile" class="btn btn-rule btn-role-select-inline" onclick="showRoleModal()">角色</button>
            <span id="roleProgress" class="role-progress" style="display:none;">
                角色进度: <span id="roleProgressPercent">0</span>%
            </span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="review-layout">
    <main class="main-content">
        <!-- Top: Previous -->
        <button id="prevBtn" class="btn btn-prev" onclick="prevImage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;"><polyline points="15 18 9 12 15 6"/></svg>
            上一张 <kbd>←</kbd>
        </button>

        <!-- Top: Skip -->
        <button id="skipBtn" class="btn btn-skip" onclick="skipImage()">
            <kbd>→</kbd> 无法定夺
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-left:4px;"><polyline points="9 18 15 12 9 6"/></svg>
        </button>

        <!-- Image Area -->
        <div class="image-container" id="imageContainer">
            <!-- Loading progress bar (from bottom to top) -->
            <div id="loadingIndicator2" class="loading-indicator" style="display:none;">
                <div class="loading-spinner"></div>
                <span id="loadingText" class="loading-text"></span>
            </div>
            <div id="roleBadge" class="image-role-badge" style="display:none;"></div>
            <img id="reviewImage" src="" alt="待审核图片" onerror="imageLoadError()">
            <div id="loadingIndicator" class="loading" style="display:none;">
                <div class="loading-spinner"></div>
                <span>加载中...</span>
            </div>
            <div id="noImageHint" class="no-image-hint" style="display:none;">
                <p>暂无待审核图片</p>
                <p class="sub-hint">可能的原因：</p>
                <ul class="sub-hint">
                    <li>所有图片已被审核完毕</li>
                    <li>尚未配置角色图库</li>
                    <li>当前角色下无待审核图片</li>
                </ul>
            </div>
        </div>

        <!-- Bottom: Fail -->
        <button id="failBtn" class="btn btn-fail" onclick="submitReview('fail')">不通过 <kbd>1</kbd> <kbd>A</kbd></button>

        <!-- Bottom: Download -->
        <button id="downloadBtn" class="btn btn-download" onclick="downloadImage()">
            <span class="dl-progress" id="dlProgress"></span>
            <span class="dl-label" id="dlLabel">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span id="dlText">下载</span>
            </span>
        </button>

        <!-- Bottom: Pass -->
        <button id="passBtn" class="btn btn-pass" onclick="submitReview('pass')">通过 <kbd>2</kbd> <kbd>D</kbd></button>
        <button id="roleSelectBtn" class="btn btn-role-select" onclick="showRoleModal()">选择角色</button>
    <div id="loadingIndicator2" class="loading-indicator" style="display:none;">
        <div class="loading-spinner"></div>
    </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <button class="nav-btn nav-prev" onclick="prevImage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>上一张</span>
        </button>
        <button class="nav-btn nav-fail" onclick="submitReview('fail')">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            <span>不通过</span>
        </button>
        <button class="nav-btn nav-pass" onclick="submitReview('pass')">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span>通过</span>
        </button>
        <button class="nav-btn nav-download" onclick="downloadImage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>下载</span>
        </button>
    </nav>

    <!-- Nickname Popover -->
    <div id="nicknameModal" class="popover-overlay" onclick="closeNicknameModal(event)">
        <div class="popover-card popover-nickname" onclick="event.stopPropagation()">
            <div class="popover-header">
                <span>修改昵称</span>
                <button class="popover-close" onclick="closeNicknameModal()">&times;</button>
            </div>
            <div class="popover-body">
                <div class="nickname-current">当前昵称：<span id="currentNickDisplay"></span></div>
                <input type="text" id="nicknameInput" class="input" placeholder="输入新昵称" maxlength="20" autocomplete="off">
                <div class="nickname-actions">
                    <button class="btn btn-cancel" onclick="closeNicknameModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveNickname()">确认修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Detail Popover -->
    <div id="imageDetailModal" class="popover-overlay" onclick="closeImageDetailModal(event)">
        <div class="popover-card popover-detail" onclick="event.stopPropagation()">
            <div class="popover-header">
                <span>图片详情</span>
                <button class="popover-close" onclick="closeImageDetailModal()">&times;</button>
            </div>
            <div class="popover-body">
                <div class="detail-grid">
                    <div class="detail-stat">
                        <span class="detail-num" id="detailReviewCount">0</span>
                        <span class="detail-label">总审核</span>
                    </div>
                    <div class="detail-stat">
                        <span class="detail-num text-pass" id="detailPassCount">0</span>
                        <span class="detail-label">通过</span>
                    </div>
                    <div class="detail-stat">
                        <span class="detail-num text-fail" id="detailFailCount">0</span>
                        <span class="detail-label">不通过</span>
                    </div>
                    <div class="detail-stat">
                        <span class="detail-num" id="detailSkipCount">0</span>
                        <span class="detail-label">跳过</span>
                    </div>
                </div>
                <div id="myStatus" class="detail-status"></div>
            </div>
        </div>
    </div>



    </main>
    <!-- Notice Popover -->
    <div id="noticeModal" class="popover-overlay" onclick="closeNoticeModal(event)">
        <div class="popover-card popover-notice" onclick="event.stopPropagation()">
            <div class="popover-header">
                <span>📢 网站公告</span>
                <button class="popover-close" onclick="closeNoticeModal()">&times;</button>
            </div>
            <div class="popover-body">
                <div id="noticeContent" class="rule-content">
                    <p style="color:var(--text-muted);">加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Rule Sidebar -->
    <aside id="rulePanel" class="rule-panel">
        <div class="rule-panel-header">
            <h3>审核要求</h3>
            <button class="close" onclick="closeRulePanel()">&times;</button>
        </div>
        <div class="rule-panel-body">
            <div id="ruleContent" class="rule-content">
                <p style="color:var(--text-muted);">加载中...</p>
            </div>
        </div>
    </aside>
    <!-- Role Panel -->
    <aside id="rolePanel" class="role-panel">
        <div class="rule-panel-header">
            <h3>选择角色</h3>
            <button class="close" onclick="closeRolePanel()">&times;</button>
        </div>
        <div class="rule-panel-body">
            <button class="btn btn-all-roles" onclick="selectRole(null)" style="width:100%;margin-bottom:12px;">全部角色</button>
            <div id="roleList" class="role-list"></div>
        </div>
    </aside>
    <!-- Panel overlay for mobile -->
    <div id="panelOverlay" class="panel-overlay" onclick="closeRulePanel();closeRolePanel();"></div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
